<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>simple-www</title>
    <link rel="stylesheet" href="styles.css">
    <link id="theme-pack" rel="stylesheet" href="themes/classic.css">
  </head>
  <body>
    <header class="site-header">
      <div class="site-brand">
        <h1 id="site-title">simple-www</h1>
        <p id="site-description">A simple Markdown website.</p>
        <nav id="module-nav" class="module-nav" aria-label="Modules"></nav>
      </div>
      <div class="header-tools">
        <label class="header-language" hidden>
          <span>Language</span>
          <select id="site-language"></select>
        </label>
        <label class="header-search">
          <span>Search</span>
          <input id="site-search" type="search" placeholder="Search">
        </label>
        <div class="segmented-control" aria-label="Layout">
          <button type="button" data-layout="list" title="List layout">List</button>
          <button type="button" data-layout="cards" title="Card layout">Cards</button>
          <button type="button" data-layout="compact" title="Compact layout">Compact</button>
        </div>
        <button id="theme-toggle" class="icon-button" type="button" title="Toggle light or dark mode">&#9790;</button>
      </div>
    </header>

    <main id="app" class="layout" tabindex="-1" aria-live="polite">
      <section class="card">
        <h2>Loading</h2>
        <p>Reading site content...</p>
      </section>
    </main>

    <footer class="site-footer">
      <span class="footer-brand">
        <span id="site-footer-label">simple-www</span>
        <a id="site-footer-repository" class="repo-icon-link" href="" title="GitHub repository" aria-label="GitHub repository" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 .7a11.3 11.3 0 0 0-3.6 22c.6.1.8-.2.8-.5v-2c-3.3.7-4-1.4-4-1.4-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.9 1.3 1.9 1.3 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.7.3 2.9.1 3.2.8.9 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.2c0 .3.2.6.8.5A11.3 11.3 0 0 0 12 .7Z"></path>
          </svg>
        </a>
      </span>
      <span class="footer-links">
        <a id="site-footer-donate" href="#donate">Donate</a>
        <a id="site-footer-contact" href="" hidden>Contact</a>
      </span>
    </footer>

    <div id="donate-overlay" class="overlay" hidden>
      <div class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="donate-title">
        <div class="overlay-header">
          <h2 id="donate-title">Donate</h2>
          <button id="donate-close" class="icon-button" type="button" title="Close donate window">&times;</button>
        </div>
        <div id="donate-details" class="donate-details"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
